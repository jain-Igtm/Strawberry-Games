<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js';

const scene = new THREE.Scene();

scene.background = new THREE.Color(0xcbe3db);
scene.fog = new THREE.FogExp2(0xcbe3db, 0.012);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({
antialias:true,
powerPreference: "high-performance"
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type = THREE.VSMShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

document.body.appendChild(renderer.domElement);

const sun = new THREE.DirectionalLight(0xfff3e0, 2.5);
sun.position.set(120, 180, 80);
sun.castShadow=true;
sun.shadow.mapSize.width = 1024;
sun.shadow.mapSize.height = 1024;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 400;
const d = 150;
sun.shadow.camera.left = -d;
sun.shadow.camera.right = d;
sun.shadow.camera.top = d;
sun.shadow.camera.bottom = -d;
sun.shadow.bias = -0.0005;
scene.add(sun);

const hemiLight = new THREE.HemisphereLight(0xa5c9eb, 0x5d784c, 1.2);
hemiLight.position.set(0, 50, 0);
scene.add(hemiLight);

const colliders = [];
const treePositions = [];
const burnables = [];
const burningObjects = [];

// --- GEOGRAPHY CONFIGURATION ---
const lakeCenterX = -150;
const lakeCenterZ = -150;
const lakeRadius = 90;

// --- FUTURE TOWN PLAIN ---
const townPlainX = 420;
const townPlainZ = 120;
const townPlainRadius = 180;
const townPlainHeight = 2.5;

function getRiverX(z) {
    return Math.sin(z * 0.015) * 45 + Math.cos(z * 0.005) * 20 + 30; 
}

// Master Terrain Height Function
function height(x, z) {
    let baseTerrain = (
        Math.sin(x*0.02)*3 +
        Math.cos(z*0.015)*4 +
        Math.sin((x+z)*0.01)*5
    );

    // 1. CARVE RIVER
    let riverX = getRiverX(z);
    let distToRiver = Math.abs(x - riverX);
    if(distToRiver < 25) {
        let t = distToRiver / 25;
        let smoothT = t * t * (3 - 2 * t);
        baseTerrain = THREE.MathUtils.lerp(-5.0, baseTerrain, smoothT);
    }

    // 2. CARVE LAKE WITH ISLAND
    let dx = x - lakeCenterX;
    let dz = z - lakeCenterZ;
    let distToLakeCenter = Math.sqrt(dx * dx + dz * dz);

    if (distToLakeCenter < lakeRadius) {
        let t = distToLakeCenter / lakeRadius; 
        let lakeFloor = -6.0;
        let lakeShape = THREE.MathUtils.lerp(lakeFloor, baseTerrain, t);
        
        if (distToLakeCenter < lakeRadius * 0.35) {
            let islandT = distToLakeCenter / (lakeRadius * 0.35); 
            let islandShape = Math.cos(islandT * Math.PI * 0.5) * 4.5 + lakeFloor; 
            baseTerrain = Math.max(lakeShape, islandShape);
        } else {
            baseTerrain = lakeShape;
        }
    }

    let pdx = x - townPlainX;
    let pdz = z - townPlainZ;
    let pDist = Math.sqrt(pdx*pdx + pdz*pdz);

    if(pDist < townPlainRadius){
        let t = pDist / townPlainRadius;
        let smoothT = t*t*(3-2*t);
        baseTerrain = THREE.MathUtils.lerp(townPlainHeight, baseTerrain, smoothT);
    }

    return baseTerrain;
}

const terrainSize=1500;
const segments=220; 

const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, segments, segments);
terrainGeo.rotateX(-Math.PI/2);

const pos = terrainGeo.attributes.position;
const colorAttr = new THREE.BufferAttribute(new Float32Array(pos.count * 3), 3);

const baseColor = new THREE.Color(0x3B5E30); 
const peakColor = new THREE.Color(0x557B43); 
const riverBankColor = new THREE.Color(0x766145); 
const tempColor = new THREE.Color();

for(let i=0; i<pos.count; i++){
    let x = pos.getX(i);
    let z = pos.getZ(i);
    let y = height(x,z);
    pos.setY(i, y);

    let riverX = getRiverX(z);
    let distToRiver = Math.abs(x - riverX);
    
    let dx = x - lakeCenterX;
    let dz = z - lakeCenterZ;
    let distToLakeCenter = Math.sqrt(dx*dx + dz*dz);

    if (distToRiver < 22) {
        let t = distToRiver / 22;
        tempColor.lerpColors(riverBankColor, baseColor, t * 0.8 + 0.2);
    } else if (distToLakeCenter < lakeRadius && Math.abs(y - (-1.2)) < 1.0) {
        tempColor.copy(riverBankColor);
    } else {
        let hRatio = (y + 12) / 24; 
        hRatio = Math.max(0, Math.min(1, hRatio));
        tempColor.lerpColors(baseColor, peakColor, hRatio);
    }
    
    let noise = (Math.sin(x*0.5) * Math.cos(z*0.5)) * 0.02;
    colorAttr.setXYZ(i, tempColor.r + noise, tempColor.g + noise, tempColor.b + noise);
}
terrainGeo.setAttribute('color', colorAttr);
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshStandardMaterial({
    vertexColors: true,
    roughness: 0.9,
    metalness: 0.02
});

const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.receiveShadow = true;
scene.add(terrain);


// --- ADD WATER SURFACE ---
const waterGeo = new THREE.PlaneGeometry(terrainSize, terrainSize);
const waterMat = new THREE.MeshStandardMaterial({
    color: 0x1d4a43,
    transparent: true,
    opacity: 0.75,
    roughness: 0.12,
    metalness: 0.15
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotateX(-Math.PI/2);
water.position.y = -1.2; 
scene.add(water);


// --- PROCEDURAL TREES POPULATION ---
const trunkGeo = new THREE.CylinderGeometry(0.18, 0.35, 6, 6);
trunkGeo.translate(0, 3, 0); 
const leafGeo = new THREE.ConeGeometry(2.2, 5, 5);
leafGeo.translate(0, 2.5, 0);
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4d321d, roughness: 0.9 });

function createTree(){
    const group = new THREE.Group();
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.castShadow = true;
    group.add(trunk);

    const greenVariation = 0.25 + Math.random() * 0.15;
    const leafMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(greenVariation * 0.4, greenVariation, greenVariation * 0.35),
        roughness: 0.8,
        flatShading: true
    });

    const layers = 3;
    for(let i=0; i<layers; i++) {
        const leaves = new THREE.Mesh(leafGeo, leafMat);
        leaves.position.y = 3.8 + (i * 2.2);
        let s = 1.0 - (i * 0.25);
        leaves.scale.set(s, s, s);
        leaves.castShadow = true;
        group.add(leaves);
    }
    return group;
}


function createOakTree(){

    const group = new THREE.Group();

    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.35,0.55,7,8),
        trunkMat
    );
    trunk.position.y = 3.5;
    trunk.castShadow = true;
    group.add(trunk);

    const branchMat = trunkMat;

    for(let i=0;i<5;i++){

        const branch = new THREE.Mesh(
            new THREE.CylinderGeometry(0.08,0.12,2.8,6),
            branchMat
        );

        branch.position.y = 5 + Math.random()*1.5;
        branch.rotation.z = (Math.random()-0.5)*1.3;
        branch.rotation.x = (Math.random()-0.5)*1.0;
        branch.rotation.y = Math.random()*Math.PI*2;

        group.add(branch);
    }

    const leafMat = new THREE.MeshStandardMaterial({
        color:0x4d7f38,
        flatShading:true
    });

    for(let i=0;i<8;i++){

        const clump = new THREE.Mesh(
            new THREE.IcosahedronGeometry(1.6 + Math.random()*0.8,0),
            leafMat
        );

        clump.position.set(
            (Math.random()-0.5)*3,
            6 + Math.random()*3,
            (Math.random()-0.5)*3
        );

        clump.castShadow = true;
        group.add(clump);
    }

    return group;
}

function createBareTree(){

    const group = new THREE.Group();

    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18,0.3,9,6),
        trunkMat
    );
    trunk.position.y = 4.5;
    trunk.castShadow = true;
    group.add(trunk);

    for(let i=0;i<9;i++){

        const branch = new THREE.Mesh(
            new THREE.CylinderGeometry(0.03,0.07,2.5,5),
            trunkMat
        );

        branch.position.y = 5 + Math.random()*3;
        branch.rotation.z = 0.5 + Math.random()*1.1;
        branch.rotation.y = Math.random()*Math.PI*2;

        group.add(branch);
    }

    return group;
}


const treeCount = 1800; 
for(let i=0; i<treeCount; i++){
    let x = (Math.random()-0.5)*1300;
    let z = (Math.random()-0.5)*1300;
    
    if(Math.abs(x) < 15 && Math.abs(z) < 15) continue;
    if(Math.abs(x - getRiverX(z)) < 22) continue; 

    let dx = x - lakeCenterX;
    let dz = z - lakeCenterZ;
    let distToLake = Math.sqrt(dx*dx + dz*dz);
    let y = height(x,z);
    
    if (distToLake < lakeRadius && y < -1.0) continue;
    if(Math.hypot(x-townPlainX,z-townPlainZ) < townPlainRadius) continue; 

    const tree = createTree();
    tree.position.set(x, y - 0.2, z);

    let s = 0.7 + Math.random() * 1.5;
    tree.scale.set(s, s + (Math.random()*0.3), s);
    tree.rotation.y = Math.random() * Math.PI;

    scene.add(tree);
    burnables.push({mesh:tree,burnTime:12,burning:false});

    treePositions.push({x,z});
    colliders.push({x,z,radius:1.6*s});
}



for(let i=0;i<450;i++){

    const x=(Math.random()-0.5)*1300;
    const z=(Math.random()-0.5)*1300;

    if(Math.abs(x - getRiverX(z)) < 22) continue;

    const y=height(x,z);
    if(y < -1) continue;
    if(Math.hypot(x-townPlainX,z-townPlainZ) < townPlainRadius) continue;

    const tree = Math.random()<0.75 ? createOakTree() : createBareTree();

    const s = 0.8 + Math.random()*1.8;

    tree.position.set(x,y-0.2,z);
    tree.scale.setScalar(s);
    tree.rotation.y = Math.random()*Math.PI*2;

    scene.add(tree);

    burnables.push({mesh:tree,burnTime:14,burning:false});
    colliders.push({x,z,radius:2.2*s});
}


// --- PROCEDURAL WOODEN STRUCTURES, HOUSES & RUINS ---
const stoneMat = new THREE.MeshStandardMaterial({ color: 0x8a8a80, roughness: 0.85, flatShading: true });
const woodMat = new THREE.MeshStandardMaterial({ color: 0x5a3d28, roughness: 0.9, flatShading: true });
const darkWoodMat = new THREE.MeshStandardMaterial({ color: 0x3d2719, roughness: 0.9, flatShading: true });
const roofMat = new THREE.MeshStandardMaterial({ color: 0x943a2d, roughness: 0.85, flatShading: true });
const doorMat = new THREE.MeshStandardMaterial({ color: 0xf59e0b, roughness: 0.5 });

const pillarGeo = new THREE.BoxGeometry(1.2, 7, 1.2);
const slabGeo = new THREE.BoxGeometry(6, 0.8, 2);

function createRuinTemple() {
    const ruinGroup = new THREE.Group();
    const p1 = new THREE.Mesh(pillarGeo, stoneMat); p1.position.set(-2.2, 3.5, 0); p1.castShadow = p1.receiveShadow = true; ruinGroup.add(p1);
    const p2 = new THREE.Mesh(pillarGeo, stoneMat); p2.position.set(2.2, 3.5, 0); p2.castShadow = p2.receiveShadow = true; ruinGroup.add(p2);
    const slab = new THREE.Mesh(slabGeo, stoneMat); slab.position.set(0, 7.4, 0); slab.castShadow = slab.receiveShadow = true; ruinGroup.add(slab);
    return ruinGroup;
}

function createWoodenStructure() {
    const structGroup = new THREE.Group();
    const postGeo = new THREE.CylinderGeometry(0.2, 0.2, 6);
    const offsets = [-2, 2];
    offsets.forEach(px => {
        offsets.forEach(pz => {
            const post = new THREE.Mesh(postGeo, woodMat);
            post.position.set(px, 3, pz);
            post.castShadow = true;
            structGroup.add(post);
        });
    });

    const deckGeo = new THREE.BoxGeometry(4.8, 0.3, 4.8);
    const deck = new THREE.Mesh(deckGeo, woodMat);
    deck.position.y = 5.5;
    deck.castShadow = deck.receiveShadow = true;
    structGroup.add(deck);

    const roofGeo = new THREE.ConeGeometry(3.5, 2.5, 4);
    const roof = new THREE.Mesh(roofGeo, new THREE.MeshStandardMaterial({color: 0x7c5a3c, roughness:0.95, flatShading:true}));
    roof.position.y = 7.75;
    roof.rotation.y = Math.PI / 4;
    roof.castShadow = true;
    structGroup.add(roof);

    return structGroup;
}

// Custom House Model
function createHouse() {
    const houseGroup = new THREE.Group();

    const bodyGeo = new THREE.BoxGeometry(5.5, 4, 4.5);
    const body = new THREE.Mesh(bodyGeo, darkWoodMat);
    body.position.y = 2;
    body.castShadow = body.receiveShadow = true;
    houseGroup.add(body);

    const houseRoofGeo = new THREE.ConeGeometry(4.8, 3, 4);
    const houseRoof = new THREE.Mesh(houseRoofGeo, roofMat);
    houseRoof.position.y = 4 + 1;
    houseRoof.rotation.y = Math.PI / 4; 
    houseRoof.scale.set(1.3, 1, 1.1); 
    houseRoof.castShadow = true;
    houseGroup.add(houseRoof);

    const doorGeo = new THREE.PlaneGeometry(1, 2.2);
    const door = new THREE.Mesh(doorGeo, doorMat);
    door.position.set(0, 1.1, 2.26); 
    houseGroup.add(door);

    return houseGroup;
}

// Custom Bridge Model
function createBridge(spanLength) {
    const bridgeGroup = new THREE.Group();
    const width = 4.5;
    
    const deckGeo = new THREE.BoxGeometry(spanLength, 0.4, width);
    const deck = new THREE.Mesh(deckGeo, woodMat);
    deck.castShadow = deck.receiveShadow = true;
    bridgeGroup.add(deck);

    const railHeight = 1.1;
    const postCount = 5;
    const railThickness = 0.15;

    for (let side of [-1, 1]) {
        let sideZ = (width / 2 - 0.15) * side;
        
        const barGeo = new THREE.BoxGeometry(spanLength, railThickness, railThickness);
        const topBar = new THREE.Mesh(barGeo, darkWoodMat);
        topBar.position.set(0, railHeight, sideZ);
        topBar.castShadow = true;
        bridgeGroup.add(topBar);

        for (let i = 0; i < postCount; i++) {
            let t = i / (postCount - 1);
            let posX = (t - 0.5) * (spanLength - 1);
            
            const fencePostGeo = new THREE.CylinderGeometry(railThickness, railThickness, railHeight + 0.2);
            const fencePost = new THREE.Mesh(fencePostGeo, darkWoodMat);
            fencePost.position.set(posX, railHeight / 2, sideZ);
            fencePost.castShadow = true;
            bridgeGroup.add(fencePost);
        }
    }

    const pierGeo = new THREE.CylinderGeometry(0.3, 0.3, 7);
    for (let offset of [-spanLength * 0.25, spanLength * 0.25]) {
        const pierL = new THREE.Mesh(pierGeo, darkWoodMat);
        pierL.position.set(offset, -3.3, width / 2 - 0.4);
        pierL.castShadow = true;
        bridgeGroup.add(pierL);

        const pierR = new THREE.Mesh(pierGeo, darkWoodMat);
        pierR.position.set(offset, -3.3, -(width / 2 - 0.4));
        pierR.castShadow = true;
        bridgeGroup.add(pierR);
    }

    return bridgeGroup;
}

// Spawn Bridges safely over predefined intervals along the River
const totalBridges = 5;
for (let i = 0; i < totalBridges; i++) {
    let z = ((i + 1) / (totalBridges + 1) - 0.5) * 1000;
    let x = getRiverX(z);
    
    let bridge = createBridge(36);
    bridge.position.set(x, -0.6, z); // Fixed height to perfectly clear water level
    
    let sampleDelta = 2;
    let riverAngle = Math.atan2(sampleDelta * 2, getRiverX(z + sampleDelta) - getRiverX(z - sampleDelta));
    bridge.rotation.y = riverAngle;
    
    scene.add(bridge);
}

// Spawn Structures & Houses across dry terrain
const totalStructuresCount = 0;
for(let i=0; i<totalStructuresCount; i++) {
    let x = (Math.random() - 0.5) * 1100;
    let z = (Math.random() - 0.5) * 1100;

    if(Math.abs(x) < 20 && Math.abs(z) < 20) continue;
    if(Math.abs(x - getRiverX(z)) < 26) continue; 

    let dx = x - lakeCenterX;
    let dz = z - lakeCenterZ;
    let distToLake = Math.sqrt(dx*dx + dz*dz);
    
    let y = height(x, z);
    
    
    if(y > -0.5) {

        let nearTree = false;
        for(const t of treePositions){
            const dx = x - t.x;
            const dz = z - t.z;
            if(dx*dx + dz*dz < 225){
                nearTree = true;
                break;
            }
        }

        if(nearTree) continue;

        let structure;
        let randVal = Math.random();

        if (randVal < 0.4) {
            structure = createHouse(); 
        } else if (distToLake < lakeRadius + 60 && randVal > 0.7) {
            structure = createWoodenStructure();
        } else {
            structure = createRuinTemple();
        }

        structure.position.set(x, y - 0.05, z);
        structure.rotation.y = Math.random() * Math.PI;
        
        let scale = 0.8 + Math.random() * 0.4;
        structure.scale.set(scale, scale, scale);
        
        scene.add(structure);

        colliders.push({
            x,
            z,
            radius:6
        });
    }
}



// --- GRASS ---
const grassMat = new THREE.MeshStandardMaterial({
    color:0x5f8f45,
    side:THREE.DoubleSide
});

for(let i=0;i<1500;i++){
    const x=(Math.random()-0.5)*1300;
    const z=(Math.random()-0.5)*1300;
    const y=height(x,z);

    const blade=new THREE.Mesh(
        new THREE.PlaneGeometry(0.35,1.0),
        grassMat
    );

    blade.position.set(x,y+0.4,z);
    blade.rotation.y=Math.random()*Math.PI;
    scene.add(blade);
    if(Math.random()<0.25) burnables.push({mesh:blade,burnTime:2,burning:false});
}


// --- FALLEN LOGS ---
const fallenLogMat = new THREE.MeshStandardMaterial({
    color:0x6b4a2e,
    roughness:0.95
});

for(let i=0;i<180;i++){
    const x=(Math.random()-0.5)*1300;
    const z=(Math.random()-0.5)*1300;
    const y=height(x,z);

    if(y < -0.8) continue;

    const logLength = 2 + Math.random()*8;
    const logRadius = 0.12 + Math.random()*0.25;

    const log = new THREE.Mesh(
        new THREE.CylinderGeometry(logRadius,logRadius,logLength,8),
        fallenLogMat
    );

    log.rotation.z = Math.PI/2;
    log.rotation.x = (Math.random()-0.5)*0.25;
    log.rotation.y = Math.random()*Math.PI;

    log.position.set(
        x,
        y + logRadius*0.7,
        z
    );

    log.castShadow = true;
    log.receiveShadow = true;

    scene.add(log);
    burnables.push({mesh:log,burnTime:8,burning:false});
}


// --- BUSHES ---
const bushGeo = new THREE.IcosahedronGeometry(1,0);
const bushMat = new THREE.MeshStandardMaterial({
    color:0x4d7a36,
    flatShading:true
});

for(let i=0;i<250;i++){
    const x=(Math.random()-0.5)*1300;
    const z=(Math.random()-0.5)*1300;
    const y=height(x,z);

    const bush=new THREE.Mesh(bushGeo,bushMat);
    bush.position.set(x,y+0.8,z);

    const s=0.7+Math.random()*1.2;
    bush.scale.set(s,s*0.7,s);

    scene.add(bush);
    burnables.push({mesh:bush,burnTime:6,burning:false});
}

let sunAngle = 0;

let weatherState = "clear";
let weatherTimer = 0;
let lightningFlash = 0;

const rainGeo = new THREE.BufferGeometry();
const rainCount = 2500;
const rainPos = new Float32Array(rainCount * 3);

for(let i=0;i<rainCount;i++){
    rainPos[i*3] = (Math.random()-0.5)*500;

let yaw=0;
let pitch=0;
const move={x:0, y:0};
let verticalVelocity = 0;
let jumpQueued = false;

const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");

let joyActive=false;
let joyTouchId = null;

joystick.addEventListener("touchstart",e=>{
    joyActive=true;
    const touch = e.changedTouches[0];
    joyTouchId = touch.identifier;
    e.preventDefault();
}, {passive: false});

joystick.addEventListener("touchmove",e=>{
    if(!joyActive) return;
    let t = null;
    for(let i=0; i<e.touches.length; i++) {
        if(e.touches[i].identifier === joyTouchId) { t = e.touches[i]; break; }
    }
    if(!t) return;

    let rect=joystick.getBoundingClientRect();
    let x=t.clientX-rect.left-65;
    let y=t.clientY-rect.top-65;
    let d=Math.sqrt(x*x+y*y);

    if(d>45){
        x*=45/d;
        y*=45/d;
    }

    stick.style.left=(45+x)+"px";
    stick.style.top=(45+y)+"px";
    move.x=x/45;
    move.y=y/45;
    e.preventDefault();
}, {passive: false});

joystick.addEventListener("touchend",e=>{
    for(let i=0; i<e.changedTouches.length; i++) {
        if(e.changedTouches[i].identifier === joyTouchId) {
            joyActive=false;
            joyTouchId = null;
            move.x=0; move.y=0;
            stick.style.left="45px";
            stick.style.top="45px";
            break;
        }
    }
});

const look=document.getElementById("look");
let lookActive=false;
let lookTouchId = null;
let lx=0; let ly=0;

look.addEventListener("touchstart",e=>{
    if(e.target === joystick || joystick.contains(e.target)) return;
    
    lookActive=true;
    const touch = e.changedTouches[0];
    lookTouchId = touch.identifier;
    lx=touch.clientX;
    ly=touch.clientY;
});

look.addEventListener("touchmove",e=>{
    if(!lookActive) return;
    let t = null;
    for(let i=0; i<e.touches.length; i++) {
        if(e.touches[i].identifier === lookTouchId) { t = e.touches[i]; break; }
    }
    if(!t) return;

    let nx=t.clientX;
    let ny=t.clientY;

    yaw+=((nx-lx)*0.005);
    pitch+=((ny-ly)*0.005);
    pitch=Math.max(-1.3, Math.min(1.3, pitch));

    lx=nx;
    ly=ny;
});

look.addEventListener("touchend",e=>{
    for(let i=0; i<e.changedTouches.length; i++) {
        if(e.changedTouches[i].identifier === lookTouchId) {
            lookActive=false;
            lookTouchId = null;
            break;
        }
    }
});

function getWalkHeight(x, z){

    let h = height(x, z);

    const totalBridges = 5;

    for(let i = 0; i < totalBridges; i++){

        let bridgeZ = ((i + 1) / (totalBridges + 1) - 0.5) * 1000;
        let bridgeX = getRiverX(bridgeZ);

        let sampleDelta = 2;
        let riverAngle = Math.atan2(
            sampleDelta * 2,
            getRiverX(bridgeZ + sampleDelta) -
            getRiverX(bridgeZ - sampleDelta)
        );

        let dx = x - bridgeX;
        let dz = z - bridgeZ;

        let cos = Math.cos(-riverAngle);
        let sin = Math.sin(-riverAngle);

        let localX = dx * cos - dz * sin;
        let localZ = dx * sin + dz * cos;

        if(
            Math.abs(localX) < 18 &&
            Math.abs(localZ) < 2.5
        ){
            h = Math.max(h, -0.4);
        }
    }

    return h;
}

// --- ADVANCED WEB AUDIO SYSTEM ---

let audioCtx = null;
let audioStarted = false;
let footstepTimer = 0;

function initAudio(){
    if(audioStarted) return;
    audioStarted = true;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    startAmbientMusic();
    // startFireAmbience();
}

function noiseBuffer(seconds=1){
    const buffer = audioCtx.createBuffer(
        1,
        seconds * audioCtx.sampleRate,
        audioCtx.sampleRate
    );

    const data = buffer.getChannelData(0);

    for(let i=0;i<data.length;i++){
        data[i] = (Math.random()*2-1);
    }

    return buffer;
}

function startAmbientMusic(){

    setInterval(()=>{

        const notes=[110,146.8,174.6,220,261.6];

        const osc=audioCtx.createOscillator();
        const gain=audioCtx.createGain();

        osc.type="triangle";
        osc.frequency.value=notes[Math.floor(Math.random()*notes.length)];

        gain.gain.value=0.0001;
        gain.gain.exponentialRampToValueAtTime(0.02,audioCtx.currentTime+2);
        gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+8);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime+8);

    },2500);
}

function playJumpSound(){

    if(!audioCtx) return;

    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.type="sine";
    osc.frequency.setValueAtTime(280,audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(520,audioCtx.currentTime+0.08);

    gain.gain.setValueAtTime(0.06,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.18);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime+0.2);
}

function playFootstep(){

    if(!audioCtx) return;

    const src=audioCtx.createBufferSource();
    src.buffer=noiseBuffer(0.05);

    const gain=audioCtx.createGain();

    gain.gain.setValueAtTime(0.02,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.08);

    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start();
}

function startFireAmbience(){

    setInterval(()=>{

        const src=audioCtx.createBufferSource();
        src.buffer=noiseBuffer(0.3);

        const filter=audioCtx.createBiquadFilter();
        filter.type="bandpass";
        filter.frequency.value=700;

        const gain=audioCtx.createGain();
        gain.gain.value=0.004 + Math.random()*0.004;

        src.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        src.start();

    },120);
}

const humanNPCs = [];

function createHumanNPC(){
 const npc=new THREE.Group();
 const skin=new THREE.MeshStandardMaterial({color:0xd8b38a});
 const clothes=new THREE.MeshStandardMaterial({color:0x4f6b8a});
 const dark=new THREE.MeshStandardMaterial({color:0x111111});

 const torso=new THREE.Mesh(new THREE.BoxGeometry(0.45,0.9,0.25),clothes);
 torso.position.y=1.2; npc.add(torso);

 const head=new THREE.Mesh(new THREE.SphereGeometry(0.18,12,12),skin);
 head.position.y=1.9; npc.add(head);

 const eye1=new THREE.Mesh(new THREE.SphereGeometry(0.02,6,6),dark);
 eye1.position.set(-0.06,1.92,0.15); npc.add(eye1);
 const eye2=eye1.clone(); eye2.position.x=0.06; npc.add(eye2);

 const armGeo=new THREE.BoxGeometry(0.10,0.7,0.10);
 const legGeo=new THREE.BoxGeometry(0.12,0.8,0.12);

 const lArm=new THREE.Mesh(armGeo,clothes);
 lArm.position.set(-0.32,1.15,0); npc.add(lArm);
 const rArm=lArm.clone(); rArm.position.x=0.32; npc.add(rArm);

 const legs=[];
 [-0.12,0.12].forEach(x=>{
   const pivot=new THREE.Group();
   pivot.position.set(x,0.8,0);
   const leg=new THREE.Mesh(legGeo,clothes);
   leg.position.y=-0.4;
   pivot.add(leg);
   npc.add(pivot);
   legs.push(pivot);
 });

 npc.userData.legs=legs;
 return npc;
}

for(let i=0;i<40;i++){

 do{

 }while(y<-0.5);

 const npc=createHumanNPC();
 npc.position.set(x,y,z);
 scene.add(npc);

 humanNPCs.push({

   dir:Math.random()*Math.PI*2,
   speed:0.015+Math.random()*0.015,
   phase:Math.random()*6.28,
   timer:0
 });
}



function animate(){

    requestAnimationFrame(animate);

    camera.rotation.order="YXZ";
    camera.rotation.y=yaw;
    camera.rotation.x=pitch;

    forward.set(-Math.sin(yaw), 0, -Math.cos(yaw));
    right.set(Math.cos(yaw), 0, -Math.sin(yaw));

    const moveForward = forward.clone().multiplyScalar(-move.y * speed);
    const moveRight = right.clone().multiplyScalar(move.x * speed);

    const newX = camera.position.x + moveForward.x + moveRight.x;
    const newZ = camera.position.z + moveForward.z + moveRight.z;

    let blocked = false;

    for(const c of colliders){
        const dx = newX - c.x;
        const dz = newZ - c.z;
        if(dx*dx + dz*dz < c.radius*c.radius){
            blocked = true;
            break;
        }
    }

    if(!blocked){
        camera.position.x = newX;
        camera.position.z = newZ;
    }

    let currentGroundY = getWalkHeight(
        camera.position.x,
        camera.position.z
    );

    let minWalkHeight = -1.2;
    let groundLevel = Math.max(currentGroundY, minWalkHeight) + 1.8;

    const onGround = camera.position.y <= groundLevel + 0.05;

    if(jumpQueued && onGround){
        verticalVelocity = 0.42; playJumpSound();
    }

    jumpQueued = false;

    verticalVelocity -= 0.018;
    camera.position.y += verticalVelocity;

    if(camera.position.y < groundLevel){
        camera.position.y = groundLevel;
        verticalVelocity = 0;
    }

    sunAngle += 0.0004;

    const sunHeight = Math.sin(sunAngle);

    sun.position.set(
        Math.cos(sunAngle)*180,
        sunHeight * 180,
        80
    );

    const daylight = Math.max(0, (sunHeight + 0.15) / 1.15);

    sun.intensity = 0.05 + daylight * 2.4;
    hemiLight.intensity = 0.03 + daylight * 1.0;

    const sky = new THREE.Color().setHSL(
        0.60,
        0.45,
        0.03 + daylight * 0.55
    );

    scene.background.copy(sky);

stars.position.x = camera.position.x;
stars.position.z = camera.position.z;

const nightAmount = 1.0 - daylight;
stars.visible = nightAmount > 0.15;

if(stars.material){
    stars.material.opacity = Math.min(1, nightAmount * 1.4);
}

    if(scene.fog) scene.fog.color.copy(sky);

    
    for(const c of critters){

        c.timer--;

        if(c.timer <= 0){
            c.dir += (Math.random()-0.5)*2.0;
            c.timer = 60 + Math.random()*180;
        }

        const dxPlayer = c.mesh.position.x - camera.position.x;
        const dzPlayer = c.mesh.position.z - camera.position.z;
        const distSq = dxPlayer*dxPlayer + dzPlayer*dzPlayer;

        let speed = c.speed;

        if(distSq < 100){
            c.dir = Math.atan2(dzPlayer,dxPlayer);
            speed *= 3;
        }

        c.mesh.position.x += Math.cos(c.dir)*speed;
        c.mesh.position.z += Math.sin(c.dir)*speed;

        c.mesh.position.y =
            height(c.mesh.position.x,c.mesh.position.z) +
            (c.mesh.userData.heightOffset || 0.3);

        
        c.phase += speed * 12;

        if(c.type === "rabbit"){
            c.mesh.position.y += Math.abs(Math.sin(c.phase)) * 0.08;

            if(c.mesh.children[2]){
                c.mesh.children[2].rotation.z = Math.sin(c.phase) * 0.15;
            }
            if(c.mesh.children[3]){
                c.mesh.children[3].rotation.z = -Math.sin(c.phase) * 0.15;
            }
        }

        
        if(c.type === "deer"){
            if(c.mesh.userData.legs){

                const a = Math.sin(c.phase*0.7) * 0.12;

                c.mesh.userData.legs[0].rotation.x = a;
                c.mesh.userData.legs[3].rotation.x = a;

                c.mesh.userData.legs[1].rotation.x = -a;
                c.mesh.userData.legs[2].rotation.x = -a;
            }

            // no floating bobbing
            c.mesh.position.y =
                height(c.mesh.position.x,c.mesh.position.z);
        }

        if(c.type === "fox"){

            const swing = Math.sin(c.phase) * 0.45;

            if(c.mesh.userData.legs){
                c.mesh.userData.legs[0].rotation.x = swing;
                c.mesh.userData.legs[3].rotation.x = swing;
                c.mesh.userData.legs[1].rotation.x = -swing;
                c.mesh.userData.legs[2].rotation.x = -swing;
            }

            if(c.mesh.userData.tailPivot){
                c.mesh.userData.tailPivot.rotation.x =
                    0.2 + Math.sin(c.phase * 0.7) * 0.15;
            }
        }

        c.mesh.rotation.y = -c.dir + Math.PI/2;

    }

    
    for(const b of birds){

        b.angle += 0.003;

        b.mesh.position.x =
            b.centerX + Math.cos(b.angle) * b.radius;

        b.mesh.position.z =
            b.centerZ + Math.sin(b.angle) * b.radius;

        b.mesh.position.y =
            b.height + Math.sin(b.angle * 2.0);

        
const flap = Math.sin(b.angle * 12) * 0.8;

if(b.mesh.userData.leftWing){
    b.mesh.userData.leftWing.rotation.z = flap;
    b.mesh.userData.rightWing.rotation.z = -flap;
}

b.mesh.rotation.x = 0.1;
b.mesh.rotation.y = -b.angle;

    }

    
    
    const t = performance.now() * 0.002;

    playerModel.rotation.y += 0.01;

    playerModel.position.y = Math.sin(t) * 0.03;

    if(playerModel.userData.leftArm){
        playerModel.userData.leftArm.rotation.x = Math.sin(t)*0.08;
        playerModel.userData.rightArm.rotation.x = -Math.sin(t)*0.08;
        playerModel.userData.leftLeg.rotation.x = -Math.sin(t)*0.05;
        playerModel.userData.rightLeg.rotation.x = Math.sin(t)*0.05;
    }

    previewRenderer.render(previewScene, previewCamera);
    
for(const ghost of ghosts){
    ghost.userData.phase += ghost.userData.speed;

    ghost.position.y =
        height(ghost.position.x, ghost.position.z) +
        1.5 +
        Math.sin(ghost.userData.phase)*0.25;

    ghost.position.x += Math.cos(ghost.userData.dir)*0.015;
    ghost.position.z += Math.sin(ghost.userData.dir)*0.015;

    if(Math.random() < 0.002){
        ghost.userData.dir += (Math.random()-0.5);
    }

    const d = camera.position.distanceTo(ghost.position);

    if(d < 8){
        ghost.visible = false;
    }else{
        ghost.visible = true;
    }
}


if(typeof deerAnimals !== 'undefined'){
    for(const deer of deerAnimals){
        if(deer.userData && deer.userData.dir !== undefined){
            deer.rotation.y = deer.userData.dir + Math.PI;
        }
    }
}


for(const fire of campfires){

    const t = performance.now() * 0.005;

    fire.userData.flame.scale.y =
        0.85 + Math.sin(t + fire.position.x) * 0.15;

    fire.userData.light.intensity =
        2.2 + Math.sin(t*1.7 + fire.position.z) * 0.6;
}



for(let i=fireSpells.length-1;i>=0;i--){

    const f = fireSpells[i];

    f.age += 0.016;

    f.radius = Math.min(12, 2.5 + f.age * 3.5);

    f.mesh.scale.set(1 + f.age*0.8, 1 + f.age*1.6, 1 + f.age*0.8);

    for(const c of critters){
        if(c.dead) continue;

        const dx = c.mesh.position.x - f.mesh.position.x;
        const dz = c.mesh.position.z - f.mesh.position.z;
        const d = Math.sqrt(dx*dx + dz*dz);

        if(d < f.radius){

            for(const v of burnables){
                if(v.burning) continue;
                if(!v.mesh.parent) continue;

                const vd = v.mesh.position.distanceTo(f.mesh.position);
                if(vd < f.radius){
                    v.burning = true;

                    const flame = new THREE.Mesh(
                        new THREE.ConeGeometry(0.25,0.7,5),
                        new THREE.MeshStandardMaterial({
                            color:0xffaa33,
                            emissive:0xff5500,
                            emissiveIntensity:2
                        })
                    );

                    flame.position.y = 0.8;
                    v.mesh.add(flame);

                    burningObjects.push({
                        obj:v,
                        flame:flame,
                        age:0
                    });
                }
            }

            if(c.health === undefined){
                c.health = (c.type === "deer") ? 10 : (c.type === "fox" ? 6 : 4);
            }

            c.health -= 0.03;

            if(c.health <= 0){
                c.dead = true;
                scene.remove(c.mesh);
            }
        }
    }

    if(f.age > 8){
        scene.remove(f.mesh);
        fireSpells.splice(i,1);
    }
}

                    emissive:0xff5500,
                    emissiveIntensity:2
                })
            );

            flame.position.y = 0.8;
            other.mesh.add(flame);

            burningObjects.push({
                obj:other,
                flame:flame,
                age:0
            });
        }
    }

    if(b.age > b.obj.burnTime){
        scene.remove(b.obj.mesh);
        burningObjects.splice(i,1);
    }
}

"X: "+Math.round(camera.position.x)+

weatherTimer += 0.016;

rain.visible = weatherState !== "clear";

        if(p[i*3+1] < height(p[i*3],p[i*3+2])){

    rain.geometry.attributes.position.needsUpdate = true;
}

}

}else{

}

        const nz=m.position.z + Math.cos(npc.dir)*npc.speed;

        if(height(nx,nz)>-0.8){
            m.position.x=nx;
            m.position.z=nz;
        } else {
            npc.dir += Math.PI*0.8;
        }

        m.position.y = height(m.position.x,m.position.z);

        m.rotation.y = npc.dir;

        npc.phase += 0.18;

const interactBtn = document.getElementById("interactBtn");
const raycaster = new THREE.Raycaster();





let magicTapCount = 0;
let magicTapTimer = null;

function castLightningSpell(){

    lightningFlash = 1.5;

    if(typeof playLightning === "function") playLightning();

    setTimeout(()=>{
        if(typeof playThunder === "function") playThunder();
    },150);

    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);

    const x = camera.position.x + dir.x * 8;
    const z = camera.position.z + dir.z * 8;

    for(const c of critters){
        const dx = c.mesh.position.x - x;
        const dz = c.mesh.position.z - z;
        if(dx*dx + dz*dz < 64){
            c.dead = true;
            scene.remove(c.mesh);
        }
    }
}

function summonRain(){
    weatherState = "rain";
}

function summonAnimals(){
    for(let i=0;i<4;i++){
        const rabbit = createRabbit();
        const a = Math.random()*Math.PI*2;
        const r = 6 + Math.random()*6;

        const x = camera.position.x + Math.cos(a)*r;
        const z = camera.position.z + Math.sin(a)*r;

        rabbit.position.set(x,height(x,z)+0.25,z);
        scene.add(rabbit);

        critters.push({
            mesh:rabbit,
            dir:Math.random()*Math.PI*2,
            speed:0.015 + Math.random()*0.02,
            timer:100,
            phase:0,
            type:"rabbit"
        });
    }
}

function castFireSpell(){

    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);

    const fire = new THREE.Group();

    for(let i=0;i<4;i++){

        const flame = new THREE.Mesh(
            new THREE.ConeGeometry(0.45,2.6 + Math.random()*1.4,6),
            new THREE.MeshStandardMaterial({
                color:0xff9933,
                emissive:0xff5500,
                emissiveIntensity:4
            })
        );

        flame.position.set(
            (Math.random()-0.5)*0.8,
            1.2 + Math.random()*0.8,
            (Math.random()-0.5)*0.8
        );

        flame.rotation.z=(Math.random()-0.5)*0.3;
        fire.add(flame);
    }

    const light = new THREE.PointLight(0xff6633,5,20);
    light.position.y = 2;
    fire.add(light);

    fire.position.set(
        camera.position.x + dir.x * 4,
        getWalkHeight(
            camera.position.x + dir.x * 4,
            camera.position.z + dir.z * 4
        ) + 0.4,
        camera.position.z + dir.z * 4
    );

    scene.add(fire);

    fireSpells.push({
        mesh:fire,
        age:0,
        radius:1.5
    });
}


// --- NPCS & DIALOGUE ---
const npcs = [];
const dialogueBox = document.getElementById("dialogueBox");

function showDialogue(msg){
    if(!dialogueBox) return;
    dialogueBox.textContent = msg;
    dialogueBox.style.display = "block";
    clearTimeout(dialogueBox._timer);
    dialogueBox._timer = setTimeout(()=>{
        dialogueBox.style.display = "none";
    },5000);
}

function createNPC(){
    const npc = new THREE.Group();

    const bodyMat = new THREE.MeshStandardMaterial({color:0x556677});

    const body = new THREE.Mesh(new THREE.BoxGeometry(0.5,1.0,0.3), bodyMat);
    body.position.y = 1.0;
    npc.add(body);

    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.22,10,10),
        new THREE.MeshStandardMaterial({color:0xd8b38a})
    );
    head.position.y = 1.75;
    npc.add(head);

    return npc;
}

const npcLines = [
    "The deer have been wandering closer to the river lately.",
    "I heard thunder even when the sky was clear.",
    "Campfires burn longer after rain. Strange, isn't it?",
    "There's an old ruin beyond the trees.",
    "The forest feels different at night.",
    "Some people swear they've seen ghosts near the ruins.",
    "I saw a pale figure between the trees last night.",
    "The ghosts seem to gather around old campfires.",
    "Don't follow strange voices in the fog.",
    "The spirits are restless after storms.",
    "My cousin claims a ghost waved at him by the lake.",
    "Blue lights sometimes drift through the forest after dark.",
    "The old tower isn't as empty as it looks.",
    "Travelers keep talking about ghosts near the river."
];

for(let i=0;i<8;i++){
    const npc = createNPC();
    const x = (Math.random()-0.5)*800;
    const z = (Math.random()-0.5)*800;

    npc.position.set(x,height(x,z),z);
    scene.add(npc);

    npcs.push({
        mesh:npc,
        line:npcLines[Math.floor(Math.random()*npcLines.length)]
    });
}


function interactWorld(){
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);

    let closestFire = null;
    let closestDist = Infinity;

    for(const fire of campfires){
        const d = camera.position.distanceTo(fire.position);
        if(d < 8 && d < closestDist){
            closestFire = fire;
            closestDist = d;
        }
    }

    if(closestFire){
        const flame = closestFire.userData.flame;
        flame.visible = !flame.visible;
        closestFire.userData.light.visible = flame.visible;
        return;
    }

    
    for(let i=foodDrops.length-1;i>=0;i--){
        const food = foodDrops[i];
        const d = camera.position.distanceTo(food.position);

        if(d < 4){
            scene.remove(food);
            foodDrops.splice(i,1);

            alert("Picked up food");
            return;
        }
    }


let closestAnimal = null;

    for(const c of critters){
        if(c.dead) continue;

        const d = camera.position.distanceTo(c.mesh.position);
        if(d < 6){
            closestAnimal = c;
            break;
        }
    }

    for(const npc of npcs){
        if(camera.position.distanceTo(npc.mesh.position) < 5){
            showDialogue(npc.line);
            return;
        }
    }

    if(closestAnimal){

        if(closestAnimal.health === undefined){
            closestAnimal.health = (closestAnimal.type === "deer") ? 10 : (closestAnimal.type === "fox" ? 6 : 4);
        }

        closestAnimal.health--;

        if(closestAnimal.health <= 0){

            closestAnimal.dead = true;
            scene.remove(closestAnimal.mesh);

            const food = new THREE.Mesh(
                new THREE.BoxGeometry(0.35,0.25,0.35),
                new THREE.MeshStandardMaterial({color:0xaa5533})
            );

            food.position.copy(closestAnimal.mesh.position);
            food.position.y += 0.2;

            scene.add(food);
            foodDrops.push(food);
        }
    }
}

if(interactBtn){
    interactBtn.addEventListener("click", interactWorld);
    interactBtn.addEventListener("touchstart", e=>{
        e.preventDefault();
        interactWorld();
    }, {passive:false});
}

const magicBtn = document.getElementById("magicBtn");

if(magicBtn){

    const handleMagicTap = ()=>{

        magicTapCount++;

        clearTimeout(magicTapTimer);

        magicTapTimer = setTimeout(()=>{

            if(magicTapCount === 1){
                castFireSpell();
            }else if(magicTapCount === 2){
                castLightningSpell();
            }else if(magicTapCount === 3){
                summonRain();
            }else if(magicTapCount >= 4){
                summonAnimals();
            }

            magicTapCount = 0;

        }, 350);
    };

    magicBtn.addEventListener("click", handleMagicTap);
    magicBtn.addEventListener("touchstart", e=>{
        e.preventDefault();
        handleMagicTap();
    }, {passive:false});
}

window.addEventListener("resize",()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
