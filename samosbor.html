<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>SAMOSBOR — Endless Combine</title>
  <link rel="stylesheet" href="samosbor.css?v=14">
</head>
<body>
  <div id="startScreen">
    <div class="start-card">
      <div class="kicker">ENDLESS RESIDENTIAL COMBINE</div>
      <h1>SAMOSBOR</h1>
      <p>Explore an infinitely streaming low-poly megastructure. When the warning lights and siren activate, enter a room and close the door before the Samosbor begins.</p>
      <button id="startBtn">ENTER COMBINE</button>
    </div>
  </div>

  <div id="hud">
    <div id="topLeft" class="panel">
      <strong id="zone">RESIDENTIAL COMBINE</strong>
      <span id="objective">EXPLORE THE ENDLESS RESIDENTIAL COMBINE</span>
    </div>
    <div id="topRight" class="panel"></div>
    <div id="alarm"></div>
    <div id="prompt"></div>
    <div id="message"></div>
    <div id="crosshair"></div>
    <div id="damage"></div>
    <div id="joystick"><div id="stick"></div></div>
    <div id="buttons">
      <button id="lampBtn">LAMP</button>
      <button id="useBtn">USE</button>
    </div>
  </div>

  <script type="module" src="src/samosbor.js?v=14"></script>
  <script src="src/samosbor-controls.js?v=14"></script>
</body>
</html>
