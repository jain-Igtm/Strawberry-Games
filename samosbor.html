<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>SAMOSBOR — Block P-747</title>
  <link rel="stylesheet" href="samosbor.css?v=7">
</head>
<body>
  <div id="startScreen">
    <div class="start-card">
      <div class="kicker">RESIDENTIAL COMBINE P-747</div>
      <h1>SAMOSBOR</h1>
      <p>Explore the service level, maintenance tunnels, stairwells, upper halls, and apartments.</p>
      <button id="startBtn">ENTER BLOCK</button>
    </div>
  </div>

  <div id="hud">
    <div id="topLeft" class="panel">
      <strong id="zone">SERVICE LEVEL 06</strong>
      <span id="objective">FIND THE STAIRWELL TO LEVEL 07</span>
    </div>
    <div id="topRight" class="panel"></div>
    <div id="alarm"></div>
    <div id="prompt"></div>
    <div id="message"></div>
    <div id="crosshair"></div>
    <div id="damage"></div>

    <div id="joystick"><div id="stick"></div></div>
    <div id="buttons">
      <button id="lampBtn">LAMP</button>
      <button id="useBtn">USE</button>
    </div>
  </div>

  <script type="module" src="src/samosbor.js?v=7"></script>
</body>
</html>
