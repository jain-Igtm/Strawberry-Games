<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forest Explorer</title>
<style>
html,body{margin:0;overflow:hidden;background:#87b8ff}
#info{position:absolute;top:10px;left:10px;color:white;font-family:sans-serif;
background:rgba(0,0,0,.35);padding:8px 12px;border-radius:8px}
</style>
<script type="importmap">
{
  "imports": {
    "three":"https://unpkg.com/three@0.166.1/build/three.module.js"
  }
}
</script>
</head>
<body>
<div id="info">Forest Explorer Prototype<br>WASD / Drag to look (desktop)</div>
<script type="module">
import * as THREE from "three";

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87b8ff);
scene.fog=new THREE.Fog(0x87b8ff,80,300);

const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,1000);
camera.position.set(0,8,18);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

const sun=new THREE.DirectionalLight(0xffffff,2);
sun.position.set(30,60,20);
sun.castShadow=true;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff,.6));

const terrain=new THREE.Mesh(
 new THREE.PlaneGeometry(250,250,120,120),
 new THREE.MeshStandardMaterial({color:0x4d8f42})
);
terrain.rotation.x=-Math.PI/2;
const pos=terrain.geometry.attributes.position;
for(let i=0;i<pos.count;i++){
 const x=pos.getX(i), z=pos.getY(i);
 pos.setZ(i,Math.sin(x*0.06)*2+Math.cos(z*0.04)*3);
}
terrain.geometry.computeVertexNormals();
terrain.receiveShadow=true;
scene.add(terrain);

for(let i=0;i<250;i++){
 const trunk=new THREE.Mesh(
   new THREE.CylinderGeometry(.18,.22,2),
   new THREE.MeshStandardMaterial({color:0x6b4423})
 );
 const crown=new THREE.Mesh(
   new THREE.ConeGeometry(1.2,2.8,8),
   new THREE.MeshStandardMaterial({color:0x2d6f2f})
 );
 const x=(Math.random()-.5)*220,z=(Math.random()-.5)*220;
 trunk.position.set(x,1,z);
 crown.position.set(x,3,z);
 trunk.castShadow=crown.castShadow=true;
 scene.add(trunk,crown);
}
addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
function animate(){
 requestAnimationFrame(animate);
 camera.lookAt(0,0,0);
 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
