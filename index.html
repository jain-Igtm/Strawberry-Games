<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Forest Explorer</title><style>html,body{margin:0;overflow:hidden;background:#18361d}canvas{display:block;touch-action:none}</style></head><body><canvas id='c'></canvas><script>const c=document.getElementById('c'),x=c.getContext('2d');let w,h,p={x:0,y:0};function r(){w=c.width=innerWidth;h=c.height=innerHeight}addEventListener('resize',r);r();let t=null;function pos(e){const a=e.touches?e.touches[0]:e;return{x:a.clientX,y:a.clientY}}c.ontouchstart=e=>t=pos(e);c.ontouchmove=e=>{e.preventDefault();if(!t)return;let q=pos(e);p.x+=(q.x-t.x)*0.12;p.y+=(q.y-t.y)*0.12;t=q};c.ontouchend=()=>t=null;function draw(){x.fillStyle='#214d28';x.fillRect(0,0,w,h);for(let i=-12;i<13;i++)for(let j=-8;j<9;j++){let gx=Math.floor((p.x/80))+i,gy=Math.floor((p.y/80))+j,s=((gx*92837111^gy*689287499)>>>0)%7;if(s===0){let sx=w/2+i*80-(p.x%80),sy=h/2+j*80-(p.y%80);x.fillStyle='#5b3a1e';x.fillRect(sx-3,sy-12,6,16);x.beginPath();x.fillStyle='#2f8f3b';x.arc(sx,sy-18,12,0,7);x.fill()}}x.fillStyle='#4aa3ff';x.beginPath();x.arc(w/2,h/2,8,0,7);x.fill();requestAnimationFrame(draw)}draw();</script></body></html>
