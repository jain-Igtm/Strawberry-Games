<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Strawberry Games - Forest Explorer</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #8fb8c8;
    touch-action: none;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  canvas { display: block; }
  #hud {
    position: fixed;
    left: 12px;
    top: 12px;
    z-index: 10;
    color: white;
    background: rgba(0,0,0,.35);
    padding: 8px 10px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.35;
    user-select: none;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,.6);
  }
  #hint {
    position: fixed;
    right: 12px;
    top: 12px;
    z-index: 10;
    color: white;
    background: rgba(0,0,0,.28);
    padding: 8px 10px;
    border-radius: 10px;
    font-size: 12px;
    user-select: none;
    pointer-events: none;
  }
  #stickBase {
    position: fixed;
    left: 22px;
    bottom: 24px;
    width: 126px;
    height: 126px;
    border-radius: 50%;
    z-index: 20;
    background: rgba(255,255,255,.13);
    border: 1px solid rgba(255,255,255,.28);
    box-shadow: 0 8px 28px rgba(0,0,0,.22);
    backdrop-filter: blur(5px);
  }
  #stickKnob {
    position: absolute;
    left: 43px;
    top: 43px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,.82);
    box-shadow: 0 3px 10px rgba(0,0,0,.35);
  }
  #lookZone {
    position: fixed;
    right: 0;
    top: 0;
    width: 62vw;
    height: 100vh;
    z-index: 15;
  }
</style>
</head>
<body>
<div id="hud">Strawberry Forest<br>X: 0 &nbsp; Z: 0</div>
<div id="hint">Left stick: move<br>Right side: look</div>
<div id="lookZone"></div>
<div id="stickBase"><div id="stickKnob"></div></div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fc8d2);
scene.fog = new THREE.FogExp2(0x9fc8d2, 0.012);

const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 650);
camera.rotation.order = "YXZ";

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.6));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const hemi = new THREE.HemisphereLight(0xcfe9ff, 0x2e4a24, 1.7);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffedc2, 2.35);
sun.position.set(80, 130, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -120;
sun.shadow.camera.right = 120;
sun.shadow.camera.top = 120;
sun.shadow.camera.bottom = -120;
scene.add(sun);

const player = new THREE.Object3D();
player.position.set(0, 8, 12);
scene.add(player);
player.add(camera);

const hud = document.getElementById("hud");
const stickBase = document.getElementById("stickBase");
const stickKnob = document.getElementById("stickKnob");
const lookZone = document.getElementById("lookZone");

let yaw = 0;
let pitch = -0.08;
let joyX = 0;
let joyY = 0;
let moveTouchId = null;
let lookTouchId = null;
let lastLookX = 0;
let lastLookY = 0;

const CHUNK = 64;
const VIEW = 3;
const chunks = new Map();
const colliders = [];

const grassMat = new THREE.MeshStandardMaterial({ color: 0x3f6f2e, roughness: 1, metalness: 0 });
const darkGrassMat = new THREE.MeshStandardMaterial({ color: 0x2d5427, roughness: 1 });
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4b321f, roughness: .95 });
const leafMat = new THREE.MeshStandardMaterial({ color: 0x315f2a, roughness: .9, flatShading: true });
const rockMat = new THREE.MeshStandardMaterial({ color: 0x777a72, roughness: 1, flatShading: true });
const waterMat = new THREE.MeshStandardMaterial({ color: 0x244e54, transparent: true, opacity: .72, roughness: .25, metalness: .05 });

const trunkGeo = new THREE.CylinderGeometry(.18, .34, 5.5, 6);
trunkGeo.translate(0, 2.75, 0);
const leavesGeo = new THREE.ConeGeometry(1.85, 4.5, 7);
leavesGeo.translate(0, 5.5, 0);
const rockGeo = new THREE.IcosahedronGeometry(1, 0);

function hash(n) {
  n = Math.imul(n ^ (n >>> 16), 2246822507);
  n = Math.imul(n ^ (n >>> 13), 3266489909);
  return (n ^= n >>> 16) >>> 0;
}

function rng(seed) {
  let s = seed >>> 0;
  return () => {
    s = Math.imul(1664525, s) + 1013904223 | 0;
    return ((s >>> 0) / 4294967296);
  };
}

function terrainHeight(x, z) {
  const hills = Math.sin(x * .018) * 3.2 + Math.cos(z * .015) * 2.7 + Math.sin((x + z) * .008) * 4.2;
  const detail = Math.sin(x * .071 + z * .033) * .9;
  const riverX = Math.sin(z * .012) * 32;
  const d = Math.abs(x - riverX);
  let h = hills + detail;
  if (d < 18) {
    const t = d / 18;
    h = THREE.MathUtils.lerp(-3.2, h, t * t * (3 - 2 * t));
  }
  return h;
}

function createTree(x, z, rand) {
  const y = terrainHeight(x, z);
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.castShadow = true;
  g.add(trunk);

  for (let i = 0; i < 3; i++) {
    const leaves = new THREE.Mesh(leavesGeo, leafMat);
    leaves.position.y = i * 1.55;
    const s = 1.05 - i * .18 + rand() * .12;
    leaves.scale.set(s, s, s);
    leaves.rotation.y = rand() * Math.PI;
    leaves.castShadow = true;
    g.add(leaves);
  }

  const scale = .75 + rand() * 1.25;
  g.position.set(x, y - .15, z);
  g.scale.set(scale, scale + rand() * .2, scale);
  g.rotation.y = rand() * Math.PI * 2;
  return g;
}

function createChunk(cx, cz) {
  const key = `${cx},${cz}`;
  if (chunks.has(key)) return;

  const group = new THREE.Group();
  group.userData.colliders = [];

  const geo = new THREE.PlaneGeometry(CHUNK, CHUNK, 18, 18);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  const colors = new Float32Array(pos.count * 3);
  const color = new THREE.Color();

  for (let i = 0; i < pos.count; i++) {
    const wx = pos.getX(i) + cx * CHUNK;
    const wz = pos.getZ(i) + cz * CHUNK;
    const h = terrainHeight(wx, wz);
    pos.setY(i, h);
    const river = Math.abs(wx - Math.sin(wz * .012) * 32);
    if (river < 20) color.setHex(0x746b49);
    else if (h > 5.5) color.setHex(0x657944);
    else color.setHex(0x2f6a2f);
    colors[i * 3] = color.r;
    colors[i * 3 + 1] = color.g;
    colors[i * 3 + 2] = color.b;
  }

  geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
  geo.computeVertexNormals();
  const mat = grassMat.clone();
  mat.vertexColors = true;
  const terrain = new THREE.Mesh(geo, mat);
  terrain.receiveShadow = true;
  terrain.position.set(cx * CHUNK, 0, cz * CHUNK);
  group.add(terrain);

  const rand = rng(hash(cx * 928371 + cz * 12377));

  for (let i = 0; i < 42; i++) {
    const x = cx * CHUNK + (rand() - .5) * CHUNK;
    const z = cz * CHUNK + (rand() - .5) * CHUNK;
    const river = Math.abs(x - Math.sin(z * .012) * 32);
    if (river < 22 || Math.hypot(x, z) < 14) continue;
    const tree = createTree(x, z, rand);
    group.add(tree);
    const radius = 1.4 * tree.scale.x;
    const c = { x, z, radius, key };
    group.userData.colliders.push(c);
    colliders.push(c);
  }

  for (let i = 0; i < 12; i++) {
    const x = cx * CHUNK + (rand() - .5) * CHUNK;
    const z = cz * CHUNK + (rand() - .5) * CHUNK;
    if (Math.abs(x - Math.sin(z * .012) * 32) < 17) continue;
    const rock = new THREE.Mesh(rockGeo, rockMat);
    const s = .5 + rand() * 1.8;
    rock.scale.set(s * 1.25, s * .55, s);
    rock.position.set(x, terrainHeight(x, z) + .35, z);
    rock.rotation.set(rand() * 1.5, rand() * 6.28, rand() * 1.5);
    rock.castShadow = true;
    rock.receiveShadow = true;
    group.add(rock);
    const c = { x, z, radius: s * 1.1, key };
    group.userData.colliders.push(c);
    colliders.push(c);
  }

  scene.add(group);
  chunks.set(key, group);
}

const water = new THREE.Mesh(new THREE.PlaneGeometry(900, 900), waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = -2.15;
scene.add(water);

function updateChunks() {
  const pcx = Math.floor(player.position.x / CHUNK);
  const pcz = Math.floor(player.position.z / CHUNK);

  for (let z = pcz - VIEW; z <= pcz + VIEW; z++) {
    for (let x = pcx - VIEW; x <= pcx + VIEW; x++) createChunk(x, z);
  }

  for (const [key, group] of chunks) {
    const [x, z] = key.split(",").map(Number);
    if (Math.abs(x - pcx) > VIEW + 1 || Math.abs(z - pcz) > VIEW + 1) {
      scene.remove(group);
      group.traverse(obj => {
        if (obj.geometry && obj !== water) obj.geometry.dispose?.();
        if (obj.material && obj.material !== grassMat && obj.material !== trunkMat && obj.material !== leafMat && obj.material !== rockMat) obj.material.dispose?.();
      });
      for (let i = colliders.length - 1; i >= 0; i--) if (colliders[i].key === key) colliders.splice(i, 1);
      chunks.delete(key);
    }
  }
}

function setJoystick(touch) {
  const rect = stickBase.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = touch.clientX - cx;
  const dy = touch.clientY - cy;
  const max = 43;
  const len = Math.hypot(dx, dy);
  const clamped = Math.min(max, len);
  const nx = len ? dx / len : 0;
  const ny = len ? dy / len : 0;
  joyX = nx * (clamped / max);
  joyY = ny * (clamped / max);
  stickKnob.style.transform = `translate(${nx * clamped}px, ${ny * clamped}px)`;
}

function resetJoystick() {
  joyX = 0;
  joyY = 0;
  moveTouchId = null;
  stickKnob.style.transform = "translate(0,0)";
}

addEventListener("touchstart", e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const onLeft = t.clientX < innerWidth * .42;
    if (onLeft && moveTouchId === null) {
      moveTouchId = t.identifier;
      setJoystick(t);
    } else if (!onLeft && lookTouchId === null) {
      lookTouchId = t.identifier;
      lastLookX = t.clientX;
      lastLookY = t.clientY;
    }
  }
}, { passive: false });

addEventListener("touchmove", e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === moveTouchId) setJoystick(t);
    if (t.identifier === lookTouchId) {
      const dx = t.clientX - lastLookX;
      const dy = t.clientY - lastLookY;
      lastLookX = t.clientX;
      lastLookY = t.clientY;
      yaw -= dx * .0042;
      pitch -= dy * .0036;
      pitch = THREE.MathUtils.clamp(pitch, -1.1, .65);
    }
  }
}, { passive: false });

addEventListener("touchend", e => {
  for (const t of e.changedTouches) {
    if (t.identifier === moveTouchId) resetJoystick();
    if (t.identifier === lookTouchId) lookTouchId = null;
  }
});
addEventListener("touchcancel", resetJoystick);

const keys = new Set();
addEventListener("keydown", e => keys.add(e.key.toLowerCase()));
addEventListener("keyup", e => keys.delete(e.key.toLowerCase()));

function canMoveTo(x, z) {
  for (const c of colliders) {
    const dx = x - c.x;
    const dz = z - c.z;
    if (dx * dx + dz * dz < (c.radius + .55) ** 2) return false;
  }
  return true;
}

let last = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min(.05, (now - last) / 1000);
  last = now;

  let forwardInput = -joyY;
  let sideInput = joyX;
  if (keys.has("w") || keys.has("arrowup")) forwardInput += 1;
  if (keys.has("s") || keys.has("arrowdown")) forwardInput -= 1;
  if (keys.has("a") || keys.has("arrowleft")) sideInput -= 1;
  if (keys.has("d") || keys.has("arrowright")) sideInput += 1;

  const len = Math.hypot(forwardInput, sideInput);
  if (len > 1) { forwardInput /= len; sideInput /= len; }

  const speed = 18;
  const sin = Math.sin(yaw);
  const cos = Math.cos(yaw);
  const dx = (sideInput * cos + forwardInput * sin) * speed * dt;
  const dz = (sideInput * -sin + forwardInput * cos) * speed * dt;

  const nx = player.position.x + dx;
  const nz = player.position.z + dz;
  if (canMoveTo(nx, player.position.z)) player.position.x = nx;
  if (canMoveTo(player.position.x, nz)) player.position.z = nz;

  const ground = terrainHeight(player.position.x, player.position.z);
  player.position.y = THREE.MathUtils.lerp(player.position.y, ground + 5.2, 8 * dt);
  player.rotation.y = yaw;
  camera.rotation.x = pitch;

  water.position.x = player.position.x;
  water.position.z = player.position.z;
  sun.position.x = player.position.x + 80;
  sun.position.z = player.position.z + 40;
  sun.target.position.copy(player.position);
  scene.add(sun.target);

  updateChunks();
  hud.innerHTML = `Strawberry Forest<br>X: ${player.position.x.toFixed(0)} &nbsp; Z: ${player.position.z.toFixed(0)}`;
  renderer.render(scene, camera);
}

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.6));
});

lookZone.addEventListener("contextmenu", e => e.preventDefault());
updateChunks();
animate(performance.now());
</script>
</body>
</html>
