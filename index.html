<!DOCTYPE html>
<html lang="en">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#91b8d9;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}canvas{display:block;width:100vw;height:100vh}#hud{position:fixed;top:10px;left:10px;right:10px;z-index:30;display:flex;justify-content:space-between;pointer-events:none;text-shadow:0 2px 7px rgba(0,0,0,.85);font-size:13px;line-height:1.35}#title{font-weight:900;letter-spacing:.06em}#coords{text-align:right;opacity:.88;font-variant-numeric:tabular-nums}#centerDot{position:fixed;left:50%;top:50%;width:5px;height:5px;margin:-2.5px 0 0 -2.5px;border-radius:50%;background:rgba(255,255,255,.72);box-shadow:0 0 8px rgba(0,0,0,.35);z-index:25;pointer-events:none}#look{position:fixed;inset:0;z-index:20;touch-action:none}#joystick{position:fixed;left:24px;bottom:24px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.38);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:40;touch-action:none}#stick{position:absolute;left:45px;top:45px;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#fff,#c7c7c7);box-shadow:0 2px 8px rgba(0,0,0,.45)}#hint{position:fixed;left:50%;bottom:164px;transform:translateX(-50%);z-index:35;width:min(92vw,520px);padding:9px 12px;border-radius:12px;background:rgba(0,0,0,.36);border:1px solid rgba(255,255,255,.16);font-size:13px;text-align:center;pointer-events:none;opacity:1;transition:opacity 1s ease}#startOverlay{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at center,rgba(63,98,74,.55),rgba(12,23,19,.88))}#startCard{width:min(92vw,430px);padding:22px;border-radius:20px;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.2);box-shadow:0 20px 70px rgba(0,0,0,.5);text-align:center}#startCard h1{margin:0 0 8px;font-size:25px}#startCard p{margin:8px 0;color:rgba(255,255,255,.84);font-size:14px;line-height:1.45}#startBtn{margin-top:14px;width:100%;padding:13px 16px;border:0;border-radius:14px;background:#f2557b;color:white;font-size:16px;font-weight:900}

<body>
<div id="hud"><div><div id="title">STRAWBERRY FOREST</div><div>Joystick: move / strafe<br>Drag screen: look around</div></div><div id="coords">x: 0<br>z: 0</div></div>
<div id="centerDot"></div><div id="look"></div><div id="joystick"><div id="stick"></div></div><div id="hint">Performance pass: taller trees, smoother chunks, less weird clustering.</div>
<div id="startOverlay"><div id="startCard"><h1>Strawberry Forest</h1><p>Taller trees, spaced forest placement, and optimized mobile rendering for less lag while moving.</p><button id="startBtn">Start</button></div></div>
<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
const scene=new THREE.Scene();scene.background=new THREE.Color(0x91b8d9);scene.fog=new THREE.FogExp2(0x91b8d9,.008);
const camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,.08,820);camera.position.set(0,4,10);
const renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:"high-performance"});renderer.setPixelRatio(1);renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=false;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.08;document.body.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0xcfe7ff,0x33442e,1.45));const sun=new THREE.DirectionalLight(0xffe0a3,2.35);sun.position.set(-95,135,75);scene.add(sun);scene.add(sun.target);
const sky=new THREE.Mesh(new THREE.SphereGeometry(500,16,8),new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,uniforms:{top:{value:new THREE.Color(0x7fb2df)},bottom:{value:new THREE.Color(0xdce9ef)}},vertexShader:`varying vec3 v;void main(){v=normalize(position);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,fragmentShader:`varying vec3 v;uniform vec3 top;uniform vec3 bottom;void main(){float h=smoothstep(-.18,.82,v.y);gl_FragColor=vec4(mix(bottom,top,h),1.0);}`}));scene.add(sky);
const chunkSize=76,chunkRadius=2,seg=12,chunks=new Map(),queue=[];
const terrainMat=new THREE.MeshStandardMaterial({vertexColors:true,roughness:.96}),pathMat=new THREE.MeshStandardMaterial({color:0x77644b,roughness:1}),waterMat=new THREE.MeshStandardMaterial({color:0x477f94,roughness:.45,transparent:true,opacity:.62}),trunkMat=new THREE.MeshStandardMaterial({color:0x5a3a22,roughness:.95}),rockMat=new THREE.MeshStandardMaterial({color:0x787b76,roughness:1}),grassMat=new THREE.MeshStandardMaterial({color:0x2f5f27,roughness:1});
const pineMats=[0x1d3f2a,0x244f31,0x193822].map(c=>new THREE.MeshStandardMaterial({color:c,roughness:.98}));const leafMat=new THREE.MeshStandardMaterial({color:0x365d2b,roughness:.95});
const trunkGeo=new THREE.CylinderGeometry(.32,.68,9.2,7),smallTrunkGeo=new THREE.CylinderGeometry(.25,.52,7.2,7),pineLowGeo=new THREE.ConeGeometry(3.35,7.4,9),pineMidGeo=new THREE.ConeGeometry(2.5,6.2,9),pineTopGeo=new THREE.ConeGeometry(1.5,4.1,8),leafGeo=new THREE.SphereGeometry(3.05,9,7),rockGeo=new THREE.DodecahedronGeometry(.9,0),grassGeo=new THREE.ConeGeometry(.045,.62,5),cloudGeo=new THREE.SphereGeometry(1,10,7);
const temp=new THREE.Object3D();
function hash2(x,z){let n=(Math.floor(x)*374761393+Math.floor(z)*668265263)|0;n=(n^(n>>13))*1274126177;return((n^(n>>16))>>>0)/4294967295}function rnd(x,z,s,a,b){return a+hash2(x+s*1013,z-s*917)*(b-a)}function sm(t){return t*t*(3-2*t)}function nse(x,z){const xi=Math.floor(x),zi=Math.floor(z),xf=x-xi,zf=z-zi,a=hash2(xi,zi),b=hash2(xi+1,zi),c=hash2(xi,zi+1),d=hash2(xi+1,zi+1),u=sm(xf),v=sm(zf);return THREE.MathUtils.lerp(THREE.MathUtils.lerp(a,b,u),THREE.MathUtils.lerp(c,d,u),v)}
function pathZ(x){return Math.sin(x*.018)*18+Math.sin(x*.006+1.3)*32}function pathBlend(x,z){return THREE.MathUtils.clamp(1-Math.abs(z-pathZ(x))/10,0,1)}function waterBlend(x,z){const v=nse(x*.012+220,z*.012-70);return v>.82?THREE.MathUtils.clamp((v-.82)/.08,0,1):0}function baseHeight(x,z){return(nse(x*.012,z*.012)-.5)*18+(nse(x*.04+81,z*.04-23)-.5)*5.5+(nse(x*.11,z*.11)-.5)*1.5}function h(x,z){let y=baseHeight(x,z);y=THREE.MathUtils.lerp(y,.35,pathBlend(x,z));if(waterBlend(x,z)>.28)y=Math.min(y,-1.2);return y}function colorAt(x,z,y){let c=new THREE.Color(0x496f34);if(y>4)c.set(0x526b40);if(y<-0.7)c.set(0x425c34);c.lerp(new THREE.Color(0x5d7741),nse(x*.18,z*.18)*.22);c.lerp(new THREE.Color(0x7b6447),pathBlend(x,z)*.95);return c}
function makeTerrain(cx,cz){const geo=new THREE.PlaneGeometry(chunkSize,chunkSize,seg,seg);geo.rotateX(-Math.PI/2);const p=geo.attributes.position,colors=[];for(let i=0;i<p.count;i++){const wx=cx*chunkSize+chunkSize/2+p.getX(i),wz=cz*chunkSize+chunkSize/2+p.getZ(i),y=h(wx,wz);p.setY(i,y);const c=colorAt(wx,wz,y);colors.push(c.r,c.g,c.b)}geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));geo.computeVertexNormals();const m=new THREE.Mesh(geo,terrainMat);m.position.set(cx*chunkSize+chunkSize/2,0,cz*chunkSize+chunkSize/2);return m}
function makePath(cx,cz){const geo=new THREE.PlaneGeometry(chunkSize,7.4,14,1);geo.rotateX(-Math.PI/2);const p=geo.attributes.position;for(let i=0;i<p.count;i++){const wx=cx*chunkSize+chunkSize/2+p.getX(i),lat=p.getZ(i),wz=pathZ(wx)+lat;p.setZ(i,wz-(cz*chunkSize+chunkSize/2));p.setY(i,h(wx,wz)+.045)}geo.computeVertexNormals();const m=new THREE.Mesh(geo,pathMat);m.position.set(cx*chunkSize+chunkSize/2,0,cz*chunkSize+chunkSize/2);return m}
function makeWater(cx,cz){const geo=new THREE.PlaneGeometry(chunkSize,chunkSize,1,1);geo.rotateX(-Math.PI/2);const m=new THREE.Mesh(geo,waterMat);m.position.set(cx*chunkSize+chunkSize/2,-1.05,cz*chunkSize+chunkSize/2);return m}
function place(mesh,i,x,y,z,scale,ry=0,sx=1,sy=1,sz=1){temp.position.set(x,y,z);temp.rotation.set(0,ry,0);temp.scale.set(scale*sx,scale*sy,scale*sz);temp.updateMatrix();mesh.setMatrixAt(i,temp.matrix)}
function tooClose(x,z,spots,d){for(const p of spots){const dx=x-p.x,dz=z-p.z;if(dx*dx+dz*dz<d*d)return true}return false}
function makeChunk(cx,cz){const key=cx+','+cz;if(chunks.has(key))return;const group=new THREE.Group();group.add(makeTerrain(cx,cz));group.add(makePath(cx,cz));let hasWater=false;for(let i=0;i<3;i++){const x=cx*chunkSize+rnd(cx*41,cz*41,i,0,chunkSize),z=cz*chunkSize+rnd(cx*43,cz*43,i,0,chunkSize);if(waterBlend(x,z)>.2)hasWater=true}if(hasWater)group.add(makeWater(cx,cz));
const spots=[];let tries=0;while(spots.length<20&&tries<160){tries++;const sx=cx*1000+tries*37,sz=cz*1000-tries*53,x=cx*chunkSize+rnd(sx,sz,1,5,chunkSize-5),z=cz*chunkSize+rnd(sx,sz,2,5,chunkSize-5);if(pathBlend(x,z)>.2||waterBlend(x,z)>.15||tooClose(x,z,spots,12))continue;spots.push({x,z,sx,sz,pine:rnd(sx,sz,3,0,1)>.25})}
const pineSpots=spots.filter(p=>p.pine),leafSpots=spots.filter(p=>!p.pine);const trunks=new THREE.InstancedMesh(trunkGeo,trunkMat,pineSpots.length),low=new THREE.InstancedMesh(pineLowGeo,pineMats[0],pineSpots.length),mid=new THREE.InstancedMesh(pineMidGeo,pineMats[1],pineSpots.length),top=new THREE.InstancedMesh(pineTopGeo,pineMats[2],pineSpots.length);pineSpots.forEach((p,i)=>{const y=h(p.x,p.z),s=rnd(p.sx,p.sz,1,.95,1.55),r=rnd(p.sx,p.sz,3,0,Math.PI*2);place(trunks,i,p.x,y+4.6,p.z,s,r);place(low,i,p.x,y+7.8,p.z,s,r,1+rnd(p.sx,p.sz,5,-.12,.12),1,1+rnd(p.sx,p.sz,6,-.12,.12));place(mid,i,p.x,y+10.5,p.z,s,r);place(top,i,p.x,y+12.95,p.z,s,r)});[trunks,low,mid,top].forEach(m=>{m.instanceMatrix.needsUpdate=true;group.add(m)});
const ltr=new THREE.InstancedMesh(smallTrunkGeo,trunkMat,leafSpots.length),leaf=new THREE.InstancedMesh(leafGeo,leafMat,leafSpots.length);leafSpots.forEach((p,i)=>{const y=h(p.x,p.z),s=rnd(p.sx,p.sz,1,.95,1.35),r=rnd(p.sx,p.sz,3,0,Math.PI*2);place(ltr,i,p.x,y+3.6,p.z,s,r);place(leaf,i,p.x,y+7.5,p.z,s,r,1.35,.8,1.25)});[ltr,leaf].forEach(m=>{m.instanceMatrix.needsUpdate=true;group.add(m)});
const rc=5,rocks=new THREE.InstancedMesh(rockGeo,rockMat,rc);for(let i=0;i<rc;i++){const sx=cx*700+i*97,sz=cz*700-i*29,x=cx*chunkSize+rnd(sx,sz,7,3,chunkSize-3),z=cz*chunkSize+rnd(sx,sz,8,3,chunkSize-3);place(rocks,i,x,h(x,z)+.35,z,rnd(sx,sz,12,.7,1.8),rnd(sx,sz,10,0,Math.PI*2),1,rnd(sx,sz,13,.3,.8),1)}rocks.instanceMatrix.needsUpdate=true;group.add(rocks);
const gc=18,grass=new THREE.InstancedMesh(grassGeo,grassMat,gc);for(let i=0;i<gc;i++){const sx=cx*501+i*19,sz=cz*501-i*23,x=cx*chunkSize+rnd(sx,sz,1,1,chunkSize-1),z=cz*chunkSize+rnd(sx,sz,2,1,chunkSize-1);place(grass,i,x,h(x,z)+.28,z,rnd(sx,sz,3,.8,1.3),rnd(sx,sz,4,0,Math.PI*2))}grass.instanceMatrix.needsUpdate=true;group.add(grass);
scene.add(group);chunks.set(key,group)}
function enqueueChunks(){const pcx=Math.floor(camera.position.x/chunkSize),pcz=Math.floor(camera.position.z/chunkSize);for(let x=pcx-chunkRadius;x<=pcx+chunkRadius;x++)for(let z=pcz-chunkRadius;z<=pcz+chunkRadius;z++){const k=x+','+z;if(!chunks.has(k)&&!queue.some(q=>q[0]===x&&q[1]===z))queue.push([x,z])}queue.sort((a,b)=>(a[0]-pcx)**2+(a[1]-pcz)**2-((b[0]-pcx)**2+(b[1]-pcz)**2));for(const[key,g]of chunks){const[cx,cz]=key.split(',').map(Number);if(Math.abs(cx-pcx)>chunkRadius+1||Math.abs(cz-pcz)>chunkRadius+1){scene.remove(g);chunks.delete(key)}}}function processQueue(){if(queue.length){const q=queue.shift();makeChunk(q[0],q[1])}}
function mountains(){const mat=new THREE.MeshStandardMaterial({color:0x69746f,roughness:1}),snow=new THREE.MeshStandardMaterial({color:0xdde3de,roughness:.85}),g=new THREE.Group();for(let i=0;i<24;i++){const a=i/24*Math.PI*2,d=320+rnd(i,9,1,-20,70),x=Math.sin(a)*d,z=Math.cos(a)*d,peak=new THREE.Mesh(new THREE.ConeGeometry(rnd(i,2,3,24,62),rnd(i,3,4,45,115),5),mat);peak.position.set(x,rnd(i,4,5,-8,8),z);peak.rotation.y=rnd(i,6,7,0,Math.PI*2);peak.scale.z=rnd(i,8,9,.65,1.5);g.add(peak);if(i%2===0){const cap=new THREE.Mesh(new THREE.ConeGeometry(rnd(i,12,13,7,18),rnd(i,14,15,8,20),5),snow);cap.position.set(x,peak.position.y+rnd(i,16,17,22,52),z);cap.rotation.y=peak.rotation.y;cap.scale.z=peak.scale.z;g.add(cap)}}scene.add(g)}function clouds(){const mat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:1,transparent:true,opacity:.48,depthWrite:false}),g=new THREE.Group();for(let c=0;c<8;c++){const cg=new THREE.Group();cg.position.set(rnd(c,1,2,-220,220),rnd(c,5,6,80,130),rnd(c,3,4,-220,220));for(let i=0;i<4;i++){const p=new THREE.Mesh(cloudGeo,mat);p.position.set(rnd(c*7,i,1,-8,8),rnd(c*7,i,2,-2,2),rnd(c*7,i,3,-3,3));p.scale.set(rnd(c*9,i,4,7,17),rnd(c*9,i,5,2,5),rnd(c*9,i,6,4,10));cg.add(p)}g.add(cg)}scene.add(g)}mountains();clouds();
const joystick=document.getElementById('joystick'),stick=document.getElementById('stick'),look=document.getElementById('look'),coords=document.getElementById('coords'),hint=document.getElementById('hint'),startOverlay=document.getElementById('startOverlay'),startBtn=document.getElementById('startBtn');const move={x:0,y:0};let joyActive=false,joyTouchId=null,lookActive=false,lookTouchId=null,lx=0,ly=0,yaw=0,pitch=-.1,last=performance.now(),started=false,lastChunkCheck=0;const keys=new Set();
joystick.addEventListener('touchstart',e=>{joyActive=true;joyTouchId=e.changedTouches[0].identifier;e.preventDefault()},{passive:false});joystick.addEventListener('touchmove',e=>{if(!joyActive)return;let t=null;for(let i=0;i<e.touches.length;i++)if(e.touches[i].identifier===joyTouchId){t=e.touches[i];break}if(!t)return;const r=joystick.getBoundingClientRect();let x=t.clientX-r.left-65,y=t.clientY-r.top-65,d=Math.hypot(x,y);if(d>45){x*=45/d;y*=45/d}stick.style.left=45+x+'px';stick.style.top=45+y+'px';move.x=x/45;move.y=y/45;e.preventDefault()},{passive:false});function resetJoy(){joyActive=false;joyTouchId=null;move.x=0;move.y=0;stick.style.left='45px';stick.style.top='45px'}joystick.addEventListener('touchend',e=>{for(let i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===joyTouchId)resetJoy()});joystick.addEventListener('touchcancel',resetJoy);
look.addEventListener('touchstart',e=>{if(e.target===joystick||joystick.contains(e.target))return;lookActive=true;lookTouchId=e.changedTouches[0].identifier;lx=e.changedTouches[0].clientX;ly=e.changedTouches[0].clientY});look.addEventListener('touchmove',e=>{if(!lookActive)return;let t=null;for(let i=0;i<e.touches.length;i++)if(e.touches[i].identifier===lookTouchId){t=e.touches[i];break}if(!t)return;const nx=t.clientX,ny=t.clientY;yaw+=(nx-lx)*.005;pitch+=(ny-ly)*.005;pitch=Math.max(-1.25,Math.min(1.05,pitch));lx=nx;ly=ny});function resetLook(){lookActive=false;lookTouchId=null}look.addEventListener('touchend',resetLook);look.addEventListener('touchcancel',resetLook);
window.addEventListener('keydown',e=>keys.add(e.code));window.addEventListener('keyup',e=>keys.delete(e.code));startBtn.addEventListener('click',()=>{started=true;startOverlay.style.display='none';setTimeout(()=>hint.style.opacity='0',4500)});function resize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)}addEventListener('resize',resize);addEventListener('orientationchange',()=>setTimeout(resize,120));
function animate(now){requestAnimationFrame(animate);const dt=Math.min((now-last)/1000,.05);last=now;if(started){let f=-move.y,s=move.x;if(keys.has('KeyW')||keys.has('ArrowUp'))f+=1;if(keys.has('KeyS')||keys.has('ArrowDown'))f-=1;if(keys.has('KeyA')||keys.has('ArrowLeft'))s-=1;if(keys.has('KeyD')||keys.has('ArrowRight'))s+=1;f=THREE.MathUtils.clamp(f,-1,1);s=THREE.MathUtils.clamp(s,-1,1);const speed=14.5,sn=Math.sin(yaw),cs=Math.cos(yaw);camera.position.x+=(-sn*f+cs*s)*speed*dt;camera.position.z+=(-cs*f-sn*s)*speed*dt;const gy=h(camera.position.x,camera.position.z);camera.position.y=gy+3.15+Math.sin(now*.007)*.035*Math.abs(f);camera.rotation.set(pitch,yaw,0,'YXZ')}if(now-lastChunkCheck>260){enqueueChunks();lastChunkCheck=now}processQueue();sun.target.position.copy(camera.position);sun.target.updateMatrixWorld();coords.innerHTML=`x: ${camera.position.x.toFixed(1)}<br>z: ${camera.position.z.toFixed(1)}`;renderer.render(scene,camera)}enqueueChunks();for(let i=0;i<6;i++)processQueue();requestAnimationFrame(animate);
</script></body></html>
