<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Strawberry Forest</title>
<link rel="stylesheet" href="style.css?v=20" />
</head>
<body>
<div id="hud"><div><div id="title">STRAWBERRY FOREST</div><div>Joystick: move / strafe<br>Drag screen: look around</div></div><div id="coords">x: 0<br>z: 0</div></div>
<div id="centerDot"></div>
<div id="joystick"><div id="stick"></div></div>
<div id="hint">Loading update 20...</div>
<div id="startOverlay"><div id="startCard"><h1>Strawberry Forest</h1><p>Chunked terrain, mobile controls, textured ridges, paths, water, rocks, and procedural forest cover.</p><button id="startBtn">Start</button></div></div>
<script>
(function(){
  var btn = document.getElementById("startBtn");
  if (!btn) return;
  btn.addEventListener("touchstart", function(e){
    e.preventDefault();
    e.stopPropagation();
    setTimeout(function(){ btn.click(); }, 0);
  }, { passive:false });
  btn.addEventListener("pointerdown", function(e){
    e.stopPropagation();
  });
})();
</script>
<script type="module" src="src/main.js?v=20"></script>
</body>
</html>
